<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 20px;">
    <div
        style="background-color: white; width: 500px; height: 300px; border-radius: 10px; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);">
        <img src="https://files.selar.co/product-images/2023/products/SkillsHub/web-development-course-selar.co-648b8472cf998.webp"
            alt="" style="width: 500px; height: 200px; border-top-left-radius: 10px; border-top-right-radius: 10px;">

        <div style="justify-content: center; align-items: center; text-align: center; padding: 10px;">

            <p style="margin: 3px; padding:2px; font-size: 18px;">Web Development Master Course <b>@Dot Batch</b></p>
            <p>
                <span
                    style="color: #4CAF50; font-weight: bold; font-size: 22px; padding: 5px; margin-left: 5px;">&#8377;
                    4500 </span>
                <span style="text-decoration: line-through; color: #888; font-size: 21px; padding: 3px;">&#8377; 6000
                </span>
                <span
                    style="color:white; background-color: #4CAF50; padding: 5px; margin-left: 5px; border: 1px solid #4CAF50; border-radius: 5px;">42%</span>
            </p>

        </div>
    </div>

    <!-- Animation hover -> another color slides over it -->
    <div style="display: flex; align-items: center; justify-content: center; margin-top: 20px;">
        <button
            style="background-color:red; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;">Hire
            me</button>
    </div>


    <div style="display: flex; align-items: center; justify-content: center; margin-top: 20px;">
        <button style="
            position: relative;
            background-color: red; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-top: 20px;
            overflow: hidden;
            z-index: 1;
        " onmouseenter="this.querySelector('.bg-slide').style.left = '0'"
            onmouseleave="this.querySelector('.bg-slide').style.left = '-100%'">
            <!-- The sliding background element controlled by inline positioning -->
            <span class="bg-slide" style="
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background-color: #8B0000;
                transition: left 0.3s ease-out;
                z-index: -1;
            "></span>

            <!-- Button Text -->
            <span style="position: relative; z-10; pointer-events: none;">Hire me</span>
        </button>
    </div>

</body>

</html>
